<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo" routerLink="/">
            ✈️ MizzAir
        </div>

        <div class="nav-menu" [class.active]="isMenuOpen">
            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link"
                (click)="closeMenu()">
                Home
            </a>
            <a routerLink="/flights" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
                Flights
            </a>
            <a routerLink="/bookings" routerLinkActive="active" class="nav-link" (click)="closeMenu()">
                My Bookings
            </a>

            <a routerLink="/admin/passengers" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
                *ngIf="authService.hasStaffOrAdmin()">
                Passengers
            </a>
            <a routerLink="/admin/staff" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
                *ngIf="authService.hasAdmin()">
                Staff
            </a>
            <a routerLink="/admin/flights" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
                *ngIf="authService.hasAdmin()">
                Manage Flights
            </a>
            <a routerLink="/admin/aircraft" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
                *ngIf="authService.hasAdmin()">
                Manage Aircraft
            </a>
        </div>

        <!-- Show Login button when not logged in -->
        <a routerLink="/login" routerLinkActive="active" class="nav-link nav-link-btn" (click)="closeMenu()"
            *ngIf="!authService.currentUser()">
            Login
        </a>

        <!-- Show User dropdown when logged in -->
        <div class="nav-actions" *ngIf="authService.currentUser()">
            <button class="notif-btn" type="button" (click)="toggleNotifications($event)"
                [attr.aria-label]="'Notifications'">
                <span class="notif-icon">🔔</span>
                <span class="notif-badge" *ngIf="notificationService.unreadCount() > 0">
                    {{ notificationService.unreadCount() }}
                </span>
            </button>

            <div class="notif-panel" *ngIf="isNotificationsOpen" (click)="$event.stopPropagation()">
                <div class="notif-panel-header">
                    <div class="notif-title">Notifications</div>
                    <button class="notif-close" type="button" (click)="closeNotifications()" aria-label="Close">
                        ✕
                    </button>
                </div>

                <div class="notif-panel-body" *ngIf="notificationService.loading()">
                    Loading…
                </div>

                <div class="notif-panel-body error" *ngIf="notificationService.error() as err">
                    {{ err }}
                </div>

                <div class="notif-panel-body empty"
                    *ngIf="!notificationService.loading() && !notificationService.error() && notificationService.notifications().length === 0">
                    No notifications yet.
                </div>

                <div class="notif-list"
                    *ngIf="!notificationService.loading() && !notificationService.error() && notificationService.notifications().length > 0">
                    <div class="notif-item" *ngFor="let n of notificationService.notifications()"
                        [class.unread]="!n.isRead">
                        <div class="notif-item-main">
                            <div class="notif-item-top">
                                <span class="notif-type">{{ n.type }}</span>
                                <span class="notif-date">{{ n.createdAt | date:'medium' }}</span>
                            </div>
                            <div class="notif-message">{{ n.message }}</div>
                        </div>
                        <button class="mark-read-btn" type="button" *ngIf="!n.isRead"
                            (click)="notificationService.markRead(n.id, true)">
                            Mark read
                        </button>
                        <button class="mark-unread-btn" type="button" *ngIf="n.isRead"
                            (click)="notificationService.markRead(n.id, false)">
                            Mark unread
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="user-section" *ngIf="authService.currentUser()" dropdown>
            <button class="user-name-btn" dropdownToggle type="button" [attr.aria-label]="'User menu'">
                {{ authService.currentUser()?.firstName }}
                <span class="dropdown-arrow">▼</span>
            </button>
            <ul *dropdownMenu class="dropdown-menu" role="menu">
                <li role="menuitem">
                    <a routerLink="/account" class="dropdown-item" (click)="closeMenu()">
                        Account
                    </a>
                </li>
                <li role="menuitem">
                    <a href="javascript:void(0)" class="dropdown-item logout-item" (click)="logout()">
                        Logout
                    </a>
                </li>
            </ul>
        </div>

        <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>
